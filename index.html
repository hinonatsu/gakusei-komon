<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="学生顧問は、現役学生3人が学生採用・若者向けサービスを本音でレビューし、改善案まで提供する相談会です。"
    />

  <body>
    <div id="root"></div>
    <script type="module">
      const isGitHubPages =
        window.location.hostname.endsWith("github.io") &&
        window.location.pathname.startsWith("/gakusei-komon");

      if (isGitHubPages) {
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = "/gakusei-komon/assets/index.css";
        document.head.appendChild(stylesheet);

        const scriptUrl = "/gakusei-komon/assets/main.js";
        import(/* @vite-ignore */ scriptUrl);
      } else {
        import("/src/main.tsx");
      }
    </script>
  </body>
